<html>
<head>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
<h2>Add Question</h2>

<!-- ✅ FORM ONLY FOR ADD -->
<form method="post">
<input name="question" placeholder="Question"><br>
<input name="o1" placeholder="Option 1"><br>
<input name="o2" placeholder="Option 2"><br>
<input name="o3" placeholder="Option 3"><br>
<input name="o4" placeholder="Option 4"><br>
<input name="answer" placeholder="Correct Answer (1-4)"><br>

<button type="submit">Add Question</button>
</form>

<!-- ✅ NOW OUTSIDE FORM -->
<h2>All Questions</h2>

{% for q in questions %}
    <p>{{ q[1] }}</p>

    <!-- ✅ EDIT BUTTON -->
    <a href="/edit/{{q[0]}}">
        <button type="button">Edit</button>
    </a>

    <!-- ✅ DELETE BUTTON -->
    <a href="/delete/{{q[0]}}">
        <button type="button" style="background:red; color:white;">Delete</button>
    </a>

    <hr>
{% endfor %}

<a href="/logout">Logout</a>
</div>

</body>
</html>
