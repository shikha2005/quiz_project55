<!DOCTYPE html>
<html>
<head>
    <title>Battle Mode</title>

    <style>

        body{
            background:black;
            color:white;
            font-family:Arial;
            margin:0;
            padding:30px;
        }

        .fighters{
            display:flex;
            justify-content:space-between;
            margin-bottom:40px;
        }

        .fighter{
            text-align:center;
        }

        img{
            width:180px;
            height:220px;
            border-radius:15px;
        }

        .quiz-box{
            text-align:center;
            background:#111;
            padding:30px;
            border-radius:20px;
        }

        button{
            display:block;
            width:60%;
            margin:15px auto;
            padding:15px;
            font-size:18px;
            cursor:pointer;
        }

    </style>

</head>

<body>

    <div class="fighters">

        <div class="fighter">

            <img src="/static/images/characters/ironman.jpg">

            <h2>IRON MAN</h2>

            <h3>HP: {{ player_hp }}</h3>

        </div>


        <div class="fighter">

            <img src="/static/images/characters/thanos.jpg">

            <h2>THANOS</h2>

            <h3>HP: {{ enemy_hp }}</h3>

        </div>

    </div>


    <div class="quiz-box">

        <h2>Question {{ q_no }}/10</h2>

        <h3>{{ question }}</h3>


        <form method="POST">

            <button name="answer" value="A">{{ option1 }}</button>

            <button name="answer" value="B">{{ option2 }}</button>

            <button name="answer" value="C">{{ option3 }}</button>

            <button name="answer" value="D">{{ option4 }}</button>

        </form>

    </div>

</body>
</html>
