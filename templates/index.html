<!DOCTYPE html>
<html>
<head>
    <title>Marvel Quiz Arena</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        /* Background video */
        #bg-video{
            position:fixed;
            top:0;
            left:0;
            min-width:100%;
            min-height:100%;
            object-fit:cover;
            z-index:-1;
        }

      .quiz-container {

    background: linear-gradient(
        135deg,
        rgba(255,255,255,0.05),
        rgba(0,0,0,0.4)
    );

    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    border: 1px solid rgba(255,255,255,0.1);
    border-top: 1px solid rgba(255,255,255,0.3);
    border-left: 1px solid rgba(255,255,255,0.2);

    box-shadow:
        0 20px 40px rgba(0,0,0,0.6),
        0 0 30px rgba(180,0,255,0.4),
        inset 0 1px 0 rgba(255,255,255,0.2);

    border-radius: 16px;

    padding: 50px;
    text-align: center;
}
        .quiz-title {
    color: #ffffff;

    text-shadow:
        0px 4px 10px rgba(0,0,0,0.8),
        0px 1px 2px rgba(0,0,0,0.5);

    font-weight: 800;
    letter-spacing: 2px;
}
        .quiz-button {
  /* Give them a dark, semi-transparent base instead of completely empty */
  background: linear-gradient(180deg, rgba(30, 30, 30, 0.8) 0%, rgba(10, 10, 10, 0.9) 100%);
  border: 1px solid #00E5FF; /* Keep your cyan border */
  color: white;
  padding: 10px 24px;
  border-radius: 8px;
  
  /* 3D button shadows */
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5), 
              inset 0 1px 1px rgba(255, 255, 255, 0.1);
              
  transition: all 0.2s ease;
  cursor: pointer;
}

/* The Hover Effect (Crucial for interactivity) */
.quiz-button:hover {
  background: linear-gradient(180deg, rgba(40, 40, 40, 0.9) 0%, rgba(20, 20, 20, 1) 100%);
  transform: translateY(-3px); /* Lifts the button up */
  box-shadow: 0 8px 15px rgba(0, 0, 0, 0.6), /* Shadow gets bigger as it lifts */
              0 0 15px rgba(0, 229, 255, 0.4); /* Add a subtle cyan glow on hover */
}

/* The Click Effect */
.quiz-button:active {
  transform: translateY(1px); /* Pushes the button down */
  box-shadow: 0 2px 5px rgba(0, 0, 0, 0.8); /* Shadow shrinks */
}
    </style>

</head>

<body>

    <!-- Video goes here, NOT inside CSS -->
    <video autoplay muted loop id="bg-video">
        <source src="{{ url_for('static', filename='videos/tt.mp4') }}" type="video/mp4">
    </video>

    <div class="quiz-container">

        <h1>MARVEL QUIZ ARENA</h1>

        <a href="/quiz"><button>Start Game</button></a>

        <a href="/login"><button>Login</button></a>

        <a href="/signup"><button>Sign Up</button></a>

    </div>

</body>
</html>
