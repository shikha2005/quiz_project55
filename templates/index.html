<!DOCTYPE html>
<html>
<head>
    <title>Marvel Quiz Arena</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        /* Background video */
        #bg-video{
            position:fixed;
            top:0;
            left:0;
            min-width:100%;
            min-height:100%;
            object-fit:cover;
            z-index:-1;
        }

        .main-box{
            text-align:center;
            background:rgba(0,0,0,0.5);
            padding:50px;
            border-radius:20px;

            box-shadow:
            0 0 20px red,
            0 0 40px blue;
        }

        h1{
            color:white;
            font-size:60px;
            margin-bottom:40px;

            text-shadow:
            0 0 20px red,
            0 0 30px blue;
        }

        button{
            padding:15px 35px;
            margin:10px;
            border:none;
            border-radius:10px;
            background:#111;
            color:white;
            font-size:18px;
            cursor:pointer;
            border:2px solid cyan;
        }

        button:hover{
            transform:scale(1.1);
            background:red;
        }

        a{
            text-decoration:none;
        }

    </style>

</head>

<body>

    <!-- Video goes here, NOT inside CSS -->
    <video autoplay muted loop id="bg-video">
        <source src="{{ url_for('static', filename='videos/tt.mp4') }}" type="video/mp4">
    </video>

    <div class="main-box">

        <h1>MARVEL QUIZ ARENA</h1>

        <a href="/quiz"><button>Start Game</button></a>

        <a href="/login"><button>Login</button></a>

        <a href="/signup"><button>Sign Up</button></a>

    </div>

</body>
</html>
