<!DOCTYPE html>
<html>
<head>
    <title>Edit Question</title>
</head>

<body>

<h2>Edit Question</h2>

<form method="post">

    <input type="text" name="question" value="{{q[1]}}" required><br><br>

    <input type="text" name="o1" value="{{q[2]}}" required><br><br>
    <input type="text" name="o2" value="{{q[3]}}" required><br><br>
    <input type="text" name="o3" value="{{q[4]}}" required><br><br>
    <input type="text" name="o4" value="{{q[5]}}" required><br><br>

    <input type="number" name="answer" value="{{q[6]}}" min="1" max="4" required><br><br>

    <button type="submit">Update</button>

</form>

</body>
</html>
