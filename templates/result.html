<div class="center">

    <h1>Your Score</h1>
    <h2>{{score}} / {{total}}</h2>

    {% if score >= total/2 %}
        <img src="{{ url_for('static', filename='reward.gif') }}" width="300">
    {% else %}
        <p>Try Again 😢</p>
    {% endif %}

    <br>

    <a href="/">Go Home</a>

</div>
