<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
<h2>Quiz</h2>

<form method="post" action="/result">
  <h3>Time Left: <span id="timer">30</span> seconds</h3>
  
{% for q in questions %}
<p><b>{{q[1]}}</b></p>

<input type="radio" name="{{q[0]}}" value="1"> {{q[2]}}<br>
<input type="radio" name="{{q[0]}}" value="2"> {{q[3]}}<br>
<input type="radio" name="{{q[0]}}" value="3"> {{q[4]}}<br>
<input type="radio" name="{{q[0]}}" value="4"> {{q[5]}}<br>
<hr>
{% endfor %}

<button>Submit</button>
</form>

</div>
<script>
let timeLeft = 30;

let timer = setInterval(function() {
    let timerElement = document.getElementById("timer");
    
    timerElement.innerText = timeLeft;

    // 🔥 Change color when low
    if (timeLeft <= 10) {
        timerElement.style.color = "red";
    }

    timeLeft--;

    if (timeLeft < 0) {
        clearInterval(timer);
        document.querySelector("form").submit();
    }
}, 1000);
</script>
