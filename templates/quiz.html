<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
<h2>Quiz</h2>

<form method="post" action="/result">
{% for q in questions %}
<p><b>{{q[1]}}</b></p>

<input type="radio" name="{{q[0]}}" value="1"> {{q[2]}}<br>
<input type="radio" name="{{q[0]}}" value="2"> {{q[3]}}<br>
<input type="radio" name="{{q[0]}}" value="3"> {{q[4]}}<br>
<input type="radio" name="{{q[0]}}" value="4"> {{q[5]}}<br>
<hr>
{% endfor %}

<button>Submit</button>
</form>

</div>

</body>
</html>
