<!DOCTYPE html>
<html>
<head>
    <title>Game Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#09051f;
        }

        .container{
            width:400px;
            padding:40px;
            border:2px solid #ff003c;
            border-radius:20px;
            background:rgba(0,0,0,0.4);

            box-shadow:
            0 0 10px #ff003c,
            0 0 20px #ff003c,
            0 0 40px #ff003c;
        }

        h1{
            color:white;
            text-align:center;
            margin-bottom:30px;
            text-shadow:0 0 20px #ff003c;
        }

        input{
            width:100%;
            padding:15px;
            margin:15px 0;
            background:transparent;
            border:2px solid #00ccff;
            border-radius:10px;
            color:white;
            outline:none;

            box-shadow:0 0 10px #00ccff;
        }

        input::placeholder{
            color:#ccc;
        }

        button{
            width:100%;
            padding:15px;
            margin-top:20px;
            border:none;
            border-radius:10px;
            background:#ff003c;
            color:white;
            font-size:18px;
            cursor:pointer;

            box-shadow:
            0 0 10px #ff003c,
            0 0 20px #ff003c;
        }

        button:hover{
            background:#00ccff;

            box-shadow:
            0 0 10px #00ccff,
            0 0 20px #00ccff;
        }

        .link{
            text-align:center;
            margin-top:20px;
        }

        .link a{
            color:#00ccff;
            text-decoration:none;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>LOGIN</h1>

    <form method="POST">

        <input type="text" name="username" placeholder="Enter Username">

        <input type="password" name="password" placeholder="Enter Password">

        <a href="/mode"><button class="quiz-button">Start Game</button></a>

    </form>
<script>
function togglePassword() {
    let pass = document.getElementById("password");

    if (pass.type === "password") {
        pass.type = "text";
    } else {
        pass.type = "password";
    }
}
</script>
    <div class="link">
        <a href="/signup">Create Account</a>
    </div>

</div>

</body>
</html>
