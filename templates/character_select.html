<!DOCTYPE html>
<html>
<head>
    <title>Choose Fighters</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            height:100vh;
            background:url("/static/images/mode.jpg") no-repeat center center;
            background-size:cover;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        .main-box{
            width:90%;
            max-width:1200px;

            background:rgba(0,0,0,0.45);

            backdrop-filter:blur(12px);
            -webkit-backdrop-filter:blur(12px);

            border-radius:20px;

            padding:30px;

            box-shadow:
            0 0 20px rgba(255,0,0,0.4),
            0 0 20px rgba(0,100,255,0.4);
        }

        .selection-area{
            display:flex;
            justify-content:space-between;
            gap:30px;
        }

        .side{
            width:48%;
            text-align:center;
        }

        h2{
            color:white;
            margin-bottom:25px;
            font-size:32px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:20px;
        }

        .hero-card{
            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(10px);

            border:2px solid cyan;

            border-radius:15px;

            padding:25px;

            color:white;

            cursor:pointer;

            box-shadow:
            0 0 10px cyan,
            0 0 20px blue;

            transition:0.3s;
        }

        .hero-card:hover{
            transform:scale(1.08);
        }

        .enemy-card{
            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(10px);

            border:2px solid red;

            border-radius:15px;

            padding:25px;

            color:white;

            cursor:pointer;

            box-shadow:
            0 0 10px red,
            0 0 20px orange;

            transition:0.3s;
        }

        .enemy-card:hover{
            transform:scale(1.08);
        }

        .start-btn{
            display:block;

            margin:40px auto 0 auto;

            padding:18px 40px;

            border:none;
            border-radius:12px;

            background:#111;

            color:white;

            font-size:20px;

            cursor:pointer;

            border:2px solid gold;

            box-shadow:
            0 0 10px gold,
            0 0 20px orange;
        }

        .start-btn:hover{
            transform:scale(1.08);
            background:red;
        }

    </style>

</head>

<body>

    <div class="main-box">

        <div class="selection-area">

            <!-- HERO SIDE -->
            <div class="side">

                <h2>CHOOSE HERO</h2>

                <div class="cards">

                    <div class="hero-card">IRON MAN</div>

                    <div class="hero-card">THOR</div>

                    <div class="hero-card">HULK</div>

                    <div class="hero-card">CAPTAIN AMERICA</div>

                </div>

            </div>


            <!-- ENEMY SIDE -->
            <div class="side">

                <h2>CHOOSE ENEMY</h2>

                <div class="cards">

                    <div class="enemy-card">THANOS</div>

                    <div class="enemy-card">LOKI</div>

                    <div class="enemy-card">ULTRON</div>

                    <div class="enemy-card">RED SKULL</div>

                </div>

            </div>

        </div>

        <a href="/battle_mode">
            <button class="start-btn">START QUIZ BATTLE</button>
        </a>

    </div>

</body>
</html>
