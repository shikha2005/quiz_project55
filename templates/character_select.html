<!DOCTYPE html>
<html>
<head>
    <title>Choose Fighters</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            height:100vh;
            background:black;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        .main-box{
            width:95%;
            max-width:1400px;

            background:rgba(255,255,255,0.05);

            backdrop-filter:blur(15px);

            border-radius:20px;

            padding:30px;

            box-shadow:
            0 0 20px blue,
            0 0 20px red;
        }

        .selection-area{
            display:flex;
            justify-content:space-between;
            gap:40px;
        }

        .side{
            width:48%;
            text-align:center;
        }

        h2{
            color:white;
            font-size:40px;
            margin-bottom:25px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:20px;
        }

        .hero-card,
        .enemy-card{
            background:#111;
            border-radius:15px;
            padding:15px;
            cursor:pointer;
            transition:0.3s;
        }

        .hero-card{
            border:2px solid cyan;

            box-shadow:
            0 0 10px cyan,
            0 0 20px blue;
        }

        .enemy-card{
            border:2px solid red;

            box-shadow:
            0 0 10px red,
            0 0 20px orange;
        }

        .hero-card:hover,
        .enemy-card:hover{
            transform:scale(1.08);
        }

        img{
            width:100%;
            height:220px;
            object-fit:cover;
            border-radius:10px;
        }

        .name{
            color:white;
            font-size:18px;
            font-weight:bold;
            margin-top:10px;
        }

        .start-btn{
            display:block;
            margin:40px auto 0 auto;

            padding:18px 40px;

            background:#111;
            color:white;

            border:2px solid gold;
            border-radius:12px;

            font-size:22px;
            cursor:pointer;

            box-shadow:
            0 0 10px gold,
            0 0 20px orange;
        }

        .start-btn:hover{
            transform:scale(1.08);
        }

        a{
            text-decoration:none;
        }

    </style>

</head>

<body>

<div class="main-box">

    <div class="selection-area">

        <!-- HERO -->
        <div class="side">

            <h2>CHOOSE HERO</h2>

            <div class="cards">

                <div class="hero-card">
                    <img src="/static/images/characters/ironman.jpg">
                    <div class="name">IRON MAN</div>
                </div>

                <div class="hero-card">
                    <img src="/static/images/characters/thor.jpg">
                    <div class="name">THOR</div>
                </div>

                <div class="hero-card">
                    <img src="/static/images/characters/spiderman.jpg">
                    <div class="name">SPIDER MAN</div>
                </div>

                <div class="hero-card">
                    <img src="/static/images/characters/wanda.jpg">
                    <div class="name">WANDA</div>
                </div>

            </div>

        </div>


        <!-- ENEMY -->
        <div class="side">

            <h2>CHOOSE ENEMY</h2>

            <div class="cards">

                <div class="enemy-card">
                    <img src="/static/images/characters/thanos.jpg">
                    <div class="name">THANOS</div>
                </div>

                <div class="enemy-card">
                    <img src="/static/images/characters/loki.jpg">
                    <div class="name">LOKI</div>
                </div>

                <div class="enemy-card">
                    <img src="/static/images/characters/ultron.jpg">
                    <div class="name">ULTRON</div>
                </div>

                <div class="enemy-card">
                    <img src="/static/images/characters/doctordom.jpg">
                    <div class="name">DOCTOR DOOM</div>
                </div>

            </div>

        </div>

    </div>

    <a href="/battle_mode">
        <button class="start-btn">START QUIZ BATTLE</button>
    </a>

</div>

</body>
</html>
