<!DOCTYPE html>
<html>
<head>
    <title>Time Attack</title>
    <style>
        body {
            background: #050a15;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .hud {
            text-align: center;
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .timer-box {
            font-size: 40px;
            font-weight: bold;
            color: #ff003c;
            text-shadow: 0 0 15px #ff003c;
        }
        .score-box {
            font-size: 30px;
            color: gold;
            text-shadow: 0 0 10px gold;
        }
        .hero-img {
            width: 150px;
            height: 180px;
            border-radius: 10px;
            border: 2px solid #00f3ff;
            box-shadow: 0 0 15px #00f3ff;
        }
        .quiz-box {
            text-align: center;
            background: rgba(10, 20, 40, 0.8);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            width: 100%;
            max-width: 600px;
            margin-top: 20px;
        }
        button {
            display: block;
            width: 80%;
            margin: 15px auto;
            padding: 15px;
            font-size: 18px;
            cursor: pointer;
            background: #111;
            color: white;
            border: 1px solid cyan;
            border-radius: 8px;
            transition: 0.2s;
        }
        button:hover {
            background: cyan;
            color: black;
            box-shadow: 0 0 15px cyan;
        }
    </style>
</head>
<body>

    <div class="hud">
        <div class="score-box">SCORE: {{ score }}</div>
        <img class="hero-img" src="/static/images/characters/{{ hero }}.jpg">
        <div class="timer-box">⏱ <span id="clock">{{ time_left }}</span>s</div>
    </div>

    <div class="quiz-box">
        <h2>{{ question }}</h2>

        <form method="POST">
            <button name="answer" value="A">{{ option1 }}</button>
            <button name="answer" value="B">{{ option2 }}</button>
            <button name="answer" value="C">{{ option3 }}</button>
            <button name="answer" value="D">{{ option4 }}</button>
        </form>
    </div>

    <script>
        // Grab the starting time passed from Python
        let timeLeft = parseInt(document.getElementById('clock').innerText);
        
        // Run this function every 1000 milliseconds (1 second)
        const timerInterval = setInterval(function() {
            timeLeft--;
            document.getElementById('clock').innerText = timeLeft;
            
            // If the timer runs out, reload the page so Python can end the game!
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                window.location.reload(); 
            }
        }, 1000);
    </script>
</body>
</html>
